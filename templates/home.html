<!doctype html>
<html lang="en" id="top">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1220" />
    <title>Happy Birthday</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="twinkles"></div>
      <div class="grain"></div>
    </div>

    <header class="topbar">
      <div class="container topbar__inner">
        <div class="brand">
          <span class="brand__spark" aria-hidden="true">✦</span>
          <span id="brandName" class="brand__text">Birthday</span>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero__grid">
          <div class="hero__copy">
            <p class="kicker">A tiny site made with love</p>
            <h1 class="title">
              Happy Birthday,
              <span class="gradient" id="friendName">Friend</span>!
            </h1>
            <p class="subtitle">Wishing you a year full of calm wins, big laughs, and the kind of memories that stick.</p>

            <div class="hero__actions">
              <a href="/birthday" onclick="localStorage.setItem('accessBirthday', 'true')" class="btn btn--primary">
                Enter the Celebration
              </a>
            </div>

            <div class="countdown card" id="countdownCard" role="status" aria-live="polite">
              <div class="countdown__label">Countdown to the big day</div>
              <div class="countdown__grid">
                <div class="pill">
                  <div class="pill__num" id="dd">—</div>
                  <div class="pill__txt">Days</div>
                </div>
                <div class="pill">
                  <div class="pill__num" id="hh">—</div>
                  <div class="pill__txt">Hours</div>
                </div>
                <div class="pill">
                  <div class="pill__num" id="mm">—</div>
                  <div class="pill__txt">Minutes</div>
                </div>
                <div class="pill">
                  <div class="pill__num" id="ss">—</div>
                  <div class="pill__txt">Seconds</div>
                </div>
              </div>
              <div class="countdown__note" id="dateNote">Set a birthday date in settings.</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>
    <div id="celebrateOverlay" class="celebrate-overlay" aria-hidden="true">
      <div class="celebrate-overlay__panel">
        <div class="celebrate-overlay__text" id="celebrateOverlayText">Happy Birthday Neju ❤️</div>
      </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
